services:
  - type: web
    name: weekly-checklist
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: NOTIFY_TOKEN
        sync: false
      - key: DB_PATH
        value: /data/checklist.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
